openapi: 3.0.3
info:
  title: Flinks API
  description: |
    Flinks API provides financial data connectivity, enrichment, and payment solutions.

    ## Authentication
    Endpoints require authentication using `flinks-auth-key` header (Bearer token).

    For more information, visit: https://docs.flinks.com
  version: 3.0.0
  contact:
    name: Flinks Support
    url: https://www.flinks.com/contact/sales
  termsOfService: https://www.flinks.com

tags:
  - name: Authorization
    description: Endpoints for generating authorization tokens and authenticating requests

servers:
  - url: https://ob.flinksapp.com
    description: Flinks Outbound Production

paths:
  /api/v1/providers:
    get:
      tags:
        - Outbound
      summary: Get Supported Data Providers
      description: Use the /api/v1/providers endpoint to retrieve a list of all supported Data Providers in the Outbound ecosystem.
      operationId: listSupportedDataProviders
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    provider_id:
                      type: integer
                      description: Unique identifier for the data provider.
                    name:
                      type: string
                      description: Name of the data provider.
                    country:
                      type: string
                      description: Country code of the data provider (e.g., CA, US).
                    scopes:
                      type: array
                      items:
                        type: string
                      description: List of data scopes supported by the data provider (e.g., ACCOUNT_BASIC, ACCOUNT_DETAILED, TRANSACTIONS, STATEMENTS, CUSTOMER_CONTACT, CUSTOMER_PERSONAL, INVESTMENTS, ACCOUNT_PAYMENTS).
              example:
                - provider_id: 1000
                  name: "Flinks Capital"
                  country: "CA"
                  scopes:
                    - "ACCOUNT_BASIC"
                    - "ACCOUNT_DETAILED"
                    - "ACCOUNT_PAYMENTS"
                    - "INVESTMENTS"
                    - "TRANSACTIONS"
                    - "STATEMENTS"
                    - "CUSTOMER_CONTACT"
                    - "CUSTOMER_PERSONAL"
        "401":
          description: Unauthorized - Expired or invalid token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid Bearer Token"
        "400":
          description: Client Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid request parameters"
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Internal Server Error"

  /api/v1/providers/{provider_id}:
    get:
      tags:
        - Outbound
      summary: Get Data Provider Details
      description: Use the /api/v1/providers endpoint to retrieve information about a particular Data Provider such as their country, their data scopes, the FDX fields they support, and more.
      operationId: getDataProviderDetails
      parameters:
        - name: provider_id
          in: path
          required: true
          description: The ID of the Data Provider who you want to retrieve information about.
          schema:
            type: string
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider_id:
                    type: integer
                    description: Unique identifier for the data provider.
                  name:
                    type: string
                    description: Name of the data provider.
                  country:
                    type: string
                    description: Country code of the data provider (e.g., CA, US).
                  provider_url:
                    type: string
                    description: URL of the data provider's website.
                  scopes:
                    type: array
                    items:
                      type: string
                    description: List of data scopes supported by the data provider.
                  data_inventory:
                    type: object
                    description: Detailed inventory of FDX fields supported by the data provider.
                    properties:
                      account:
                        type: array
                        items:
                          type: string
                      customers:
                        type: array
                        items:
                          type: string
                      detailed_accounts:
                        type: array
                        items:
                          type: string
                      lightweight_accounts:
                        type: array
                        items:
                          type: string
                      payments:
                        type: array
                        items:
                          type: string
                      transactions:
                        type: array
                        items:
                          type: string
              example:
                provider_id: 4013
                name: "1st United CU"
                country: "US"
                provider_url: "https://accounts.1stunitedcu.org/"
                scopes:
                  - "ACCOUNT_BASIC"
                  - "ACCOUNT_DETAILED"
                  - "ACCOUNT_PAYMENTS"
                  - "INVESTMENTS"
                  - "TRANSACTIONS"
                  - "STATEMENTS"
                  - "CUSTOMER_CONTACT"
                  - "CUSTOMER_PERSONAL"
                data_inventory:
                  account: []
                  customers:
                    - "customerId"
                    - "name.first"
                    - "name.last"
                    - "emails"
                    - "email"
                    - "addresses.line1"
                    - "addresses.city"
                    - "addresses.region"
                    - "addresses.postalCode"
                    - "telephones.number"
                    - "name.middle"
                  detailed_accounts:
                    - "accounts.depositAccount.currentBalance"
                    - "accounts.depositAccount.accountId"
                    - "accounts.depositAccount.accountType"
                    - "accounts.depositAccount.accountNumberDisplay"
                    - "accounts.depositAccount.productName"
                    - "accounts.depositAccount.currency.currencyCode"
                    - "accounts.depositAccount.availableBalance"
                  lightweight_accounts: []
                  payments:
                    - "paymentNetworks.bankId"
                    - "paymentNetworks.identifier"
                    - "paymentNetworks.identifierType"
                    - "paymentNetworks.type"
                    - "paymentNetworks.transferIn"
                    - "paymentNetworks.transferOut"
                  transactions:
                    - "page.nextOffset"
                    - "links.next.href"
                    - "transactions.depositTransaction.accountId"
                    - "transactions.depositTransaction.transactionId"
                    - "transactions.depositTransaction.postedTimestamp"
                    - "transactions.depositTransaction.transactionTimestamp"
                    - "transactions.depositTransaction.description"
                    - "transactions.depositTransaction.amount"
                    - "transactions.depositTransaction.transactionType"
                    - "transactions.depositTransaction.status"
        "401":
          description: Unauthorized - Expired or invalid token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid Bearer Token"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Provider not found"
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Internal Server Error"

  /api/v1/revoke:
    delete:
      tags:
        - Outbound
      summary: Revoke Connection
      description: Use the /api/v1/revoke endpoint to revoke access to the Open Banking API for an individual connection.
      operationId: revokeConnection
      responses:
        "204":
          description: The connection was successfully revoked. No response body is returned.
        "400":
          description: Returned when the request is missing a required parameter or is otherwise invalid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: The error code.
                  error_description:
                    type: string
                    description: A description of the error.
              example:
                error: "invalid_request"
                error_description: "The request is missing a required parameter."
        "500":
          description: Returned when an unhandled error occurred on the server.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: The error code.
                  error_description:
                    type: string
                    description: A description of the error.
              example:
                error: "server_error"
                error_description: "An unhandled error occurred on the server."

  /api/v1/recipients:
    get:
      tags:
        - Outbound
      summary: Get All Data Recipients
      description: Use the /api/v1/recipients endpoint to get a list of all registered Data Recipients.
      operationId: getAllDataRecipients
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    client_id:
                      type: string
                      description: Unique identifier for the data recipient.
                    name:
                      type: string
                      description: Name of the data recipient.
                    logo_uri:
                      type: string
                      description: URL to the data recipient's logo.
                    description:
                      type: string
                      description: Description of the data recipient.
                    terms_uri:
                      type: string
                      description: URL to the data recipient's terms of service.
                    client_uri:
                      type: string
                      description: URL to the data recipient's website.
                    country:
                      type: string
                      description: Country code of the data recipient (e.g., CA, US).
                    contacts:
                      type: array
                      items:
                        type: object
                        properties:
                          email:
                            type: string
                            description: Email address of the contact.
                      description: Contact information for the data recipient.
              example:
                - client_id: "dc-xxxxxxxxxxxxxxxxxxxxxxxxx"
                  name: "Flinks Fake"
                  logo_uri: "https://flinks.fake.com/logo.png"
                  description: "Description of Flinks Fake"
                  terms_uri: "https://flinks.fake.com/callback/terms.html"
                  client_uri: "https://flinks.fake.com/"
                  country: "CA"
                  contacts:
                    - email: "john.doe@flinks.fake.com"
        "401":
          description: Unauthorized - Expired or invalid token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid Bearer Token"
        "400":
          description: Client Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid request parameters"
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Internal Server Error"
    post:
      tags:
        - Outbound
      summary: Create a Data Recipient
      description: Use the /api/v1/recipients endpoint to add a new Data Recipient to the Open Banking API.
      operationId: createDataRecipient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "The name of the new Data Recipient. Enter it exactly as you want customers to see it, using a maximum length of 256 characters."
                  maxLength: 256
                scope:
                  type: array
                  items:
                    type: string
                  default: [ACCOUNT_BASIC]
                  description: |
                    The scope of data that the Data Recipient collects from the customer, and is populated on the consent screen. To work with this Data Recipient, the customer must provide consent to share the scope of data they require. Possible values include the following:

                    ACCOUNT_BASIC = Basic account information (required)
                    ACCOUNT_DETAILED = Detailed account information
                    ACCOUNT_PAYMENTS = Payment information linked to the account
                    INVESTMENTS = Investment information linked to the account
                    TRANSACTIONS = Payment information linked to the account
                    STATEMENTS = PDF statements for the account
                    CUSTOMER_CONTACT = Contact information for the account
                    CUSTOMER_PERSONAL = Information about the customer who owns the account
                    The scopes needs to be delimited by a space and they must include ACCOUNT_BASIC at a minimum
                redirect_uris:
                  type: string
                  description: "URL redirects for the Data Recipient, using an HTTPS scheme."
                logo_uri:
                  type: string
                  description: "A hyperlink to the Data Recipient's logo, using the HTTPS scheme."
                country:
                  type: string
                  description: "Countries that the Data Recipient is registered in. Possible values include: - `CA` - Canada - `US` - United States"
                description:
                  type: string
                  description: "The description of the Data Recipient, using a maximum length of 512 characters."
                  maxLength: 512
                terms_uri:
                  type: string
                  description: "A hyperlink to the terms of service between the customer and the Data Recipient, using an HTTPS scheme. Must be human-readable."
                client_uri:
                  type: string
                  description: "A hyperlink to the Data Recipient's corporate website, using an HTTPS scheme."
                contacts:
                  type: array
                  items:
                    type: object
                  description: Point of contacts for the Data Recipient.
              example: {}
      responses:
        "201":
          description: Result
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                  client_secret:
                    type: string
                  name:
                    type: string
                  logo_uri:
                    type: string
                  description:
                    type: string
                  terms_uri:
                    type: string
                  client_uri:
                    type: string
                  country:
                    type: string
                  redirect_uris:
                    type: array
                    items:
                      type: string
                  scope:
                    type: string
                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        email:
                          type: array
                          items:
                            type: string
              example:
                client_id: "dc-xxxxxxxxxxxxxxxxxxxxxxxxx"
                client_secret: "xxxxxxxxxxxxxxxxxxxxxx"
                name: "Flinks Fake"
                logo_uri: "https://flinks.fake.com/logo.png"
                description: "Description of Flinks Fake"
                terms_uri: "https://flinks.fake.com/callback/terms.html"
                client_uri: "https://flinks.fake.com"
                country: "CA"
                redirect_uris:
                  - "https://flinks.fake.com/callback"
                scope: "ACCOUNT_BASIC ACCOUNT_DETAILED ACCOUNT_PAYMENTS INVESTMENTS TRANSACTIONS STATEMENTS CUSTOMER_CONTACT CUSTOMER_PERSONAL"
                contacts:
                  - email: "john.doe@flinks.fake.com"
        "401":
          description: Unauthorized - Expired or invalid token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid Bearer Token"
        "400":
          description: Client Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid request parameters"
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Internal Server Error"

  /api/v1/recipients/providers/requests:
    get:
      tags:
        - Outbound
      summary: Get the Registration Status for All Data Recipients
      description: Use the /api/v1/recipients/providers/requests endpoint to check the registrations status of all Data Recipients.
      operationId: getSupportedDataProvidersStatus
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    client_id:
                      type: string
                      description: Unique identifier for the data recipient.
                    client_name:
                      type: string
                      description: Name of the data recipient.
                    provider_id:
                      type: integer
                      description: Unique identifier for the data provider.
                    provider_name:
                      type: string
                      description: Name of the data provider.
                    country:
                      type: string
                      description: Country code of the data provider (e.g., CA, US).
                    registration_status:
                      type: string
                      description: Current registration status (PENDING_APPROVAL, PENDING_ACTIVATION, or ACTIVE).
                    requested_on:
                      type: string
                      description: Timestamp of when the registration was requested (ISO 8601 format).
              example:
                - client_id: "dc-xxxxxxxxxxxxxxxxxxxxxxxxx"
                  client_name: "Flinks Fake"
                  provider_id: 2000
                  provider_name: "NBC"
                  country: "CA"
                  registration_status: "PENDING_APPROVAL"
                  requested_on: "2024-02-29T14:24:42.6055680Z"
                - client_id: "dc-xxxxxxxxxxxxxxxxxxxxxxxxx"
                  client_name: "Flinks Fake"
                  provider_id: 1000
                  provider_name: "Flinks Capital"
                  country: "CA"
                  registration_status: "PENDING_APPROVAL"
                  requested_on: "2024-02-29T14:24:42.6009460Z"
        "401":
          description: Unauthorized - Expired or invalid token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid Bearer Token"
        "400":
          description: Client Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid request parameters"
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Internal Server Error"

  /api/v1/recipients/providers/requests/{recipient_ids}/{provider_ids}:
    post:
      tags:
        - Outbound
      summary: Request Data Provider Registrations
      description: Use the POST /api/v1/recipients/providers/requests/{recipient_ids}/{provider_ids} endpoint to submit a request to Flinks to connect Data Recipients with Data Providers. Flinks will evaluate the request and approve the registrations.
      operationId: requestDataProviderRegistrations
      parameters:
        - name: recipient_ids
          in: path
          required: true
          description: The IDs of Data Recipients who you want to request registration for.
          schema:
            type: array
            items:
              type: string
        - name: provider_ids
          in: path
          required: true
          description: The IDs of Data Providers who you want to include in the registration.
          schema:
            type: array
            items:
              type: string
      responses:
        "401":
          description: Unauthorized - Expired or invalid token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid Bearer Token"
        "400":
          description: Client Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid request parameters"
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Internal Server Error"

  /api/v1/recipients/{client_id}/providers/requests:
    get:
      tags:
        - Outbound
      summary: Get the Registration Status for a Data Recipient
      description: Use the /api/v1/recipients/{client_id}/providers/requests endpoint to check the registrations status of a Data Recipient.
      operationId: getRegistrationStatus
      parameters:
        - name: client_id
          in: path
          required: true
          description: The ID of Data Recipient who you want to check the registrations status for.
          schema:
            type: string
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    client_id:
                      type: string
                      description: Unique identifier for the data recipient.
                    client_name:
                      type: string
                      description: Name of the data recipient.
                    provider_id:
                      type: integer
                      description: Unique identifier for the data provider.
                    provider_name:
                      type: string
                      description: Name of the data provider.
                    country:
                      type: string
                      description: Country code of the data provider (e.g., CA, US).
                    registration_status:
                      type: string
                      description: Current registration status (PENDING_APPROVAL, PENDING_ACTIVATION, or ACTIVE).
                    requested_on:
                      type: string
                      description: Timestamp of when the registration was requested (ISO 8601 format).
              example:
                - client_id: "dc-xxxxxxxxxxxxxxxxxxxxxxxxx"
                  client_name: "Flinks Fake"
                  provider_id: 1000
                  provider_name: "Flinks Capital"
                  country: "CA"
                  registration_status: "PENDING_APPROVAL"
                  requested_on: "2024-02-29T14:24:42.6009460Z"
                - client_id: "dc-xxxxxxxxxxxxxxxxxxxxxxxxx"
                  client_name: "Flinks Fake"
                  provider_id: 2000
                  provider_name: "NBC"
                  country: "CA"
                  registration_status: "PENDING_APPROVAL"
                  requested_on: "2024-02-29T14:24:42.6055680Z"
        "401":
          description: Unauthorized - Expired or invalid token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid Bearer Token"
        "400":
          description: Client Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid request parameters"
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Internal Server Error"

  /api/v1/recipients/{client_id}/secret:
    post:
      tags:
        - Outbound
      summary: Regenerate a Data Recipient Secret
      description: Use the /api/v1/recipients/{client_id}/secret endpoint to regenerate a new client secret for a particular Data Recipient.
      operationId: regenerateDataRecipientSecret
      parameters:
        - name: client_id
          in: path
          required: true
          description: The Data Recipient that you want to generate a secret for.
          schema:
            type: string
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                  client_secret:
                    type: string
              example:
                client_id: "dc-xxxxxxxxxxxxxxxxxxxxxxxxx"
                client_secret: "xxxxxxxxxxxxxxxxxxxxxx"
        "401":
          description: Unauthorized - Expired or invalid token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid Bearer Token"
        "400":
          description: Client Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid request parameters"
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Internal Server Error"

  /api/v1/recipients/{client_id}:
    get:
      tags:
        - Outbound
      summary: Get Data Recipient Details
      description: Use the /api/v1/recipients/{client_id} endpoint to get additional details for a particular Data Recipient, including the scopes and redirect URLs.
      operationId: getDataRecipientDetails
      parameters:
        - name: client_id
          in: path
          required: true
          description: The id for the Data Recipient you want to retrieve details for.
          schema:
            type: string
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                type: object
                properties:
                  scope:
                    type: string
                    description: Space-separated list of scopes the data recipient has access to (e.g., ACCOUNT_BASIC ACCOUNT_DETAILED TRANSACTIONS STATEMENTS).
                  redirect_uris:
                    type: array
                    items:
                      type: string
                    description: List of authorized redirect URIs for the data recipient.
                  client_id:
                    type: string
                    description: Unique identifier for the data recipient.
                  name:
                    type: string
                    description: Name of the data recipient.
                  logo_uri:
                    type: string
                    description: URL to the data recipient's logo.
                  description:
                    type: string
                    description: Description of the data recipient.
                  terms_uri:
                    type: string
                    description: URL to the data recipient's terms of service.
                  client_uri:
                    type: string
                    description: URL to the data recipient's website.
                  country:
                    type: string
                    description: Country code of the data recipient (e.g., CA, US).
                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        email:
                          type: string
                          description: Email address of the contact.
                    description: Contact information for the data recipient.
              example:
                scope: "ACCOUNT_BASIC ACCOUNT_DETAILED ACCOUNT_PAYMENTS INVESTMENTS TRANSACTIONS STATEMENTS CUSTOMER_CONTACT CUSTOMER_PERSONAL"
                redirect_uris:
                  - "https://flinks.fake.com/callback"
                  - "https://flinks.fake.com/callback2"
                client_id: "dc-xxxxxxxxxxxxxxxxxxxxxxxxx"
                name: "Flinks Fake"
                logo_uri: "https://flinks.fake.com/logo.png"
                description: "Description of Flinks Fake"
                terms_uri: "https://flinks.fake.com/callback/terms.html"
                client_uri: "https://flinks.fake.com/"
                country: "CA"
                contacts:
                  - email: "john.doe@flinks.fake.com"
        "401":
          description: Unauthorized - Expired or invalid token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Invalid Bearer Token"
        "400":
          description: Client Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "The recipient \"dc-xyz\" doesn't exists"
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
